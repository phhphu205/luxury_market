<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test</title>
</head>
<body>
    <div id="profileModal" class="profile-modal">
  <div class="profile-box">
    <h2>Hồ sơ cá nhân</h2>
    <div style="text-align: center; margin-bottom: 20px;">
        <img id="profileAvatarPreview" src="" alt="Avatar" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); margin-bottom: 10px;">
    </div>
    <p><strong>Tên đăng nhập:</strong> <span id="profileUsername"></span></p>
    <div style="margin-bottom: 20px; text-align: left;">
        <label style="display:block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: var(--text-muted);">Tải ảnh Avatar lên:</label>
        <input type="file" id="avatarFileInput" accept="image/*" style="width: 100%; padding: 10px; border-radius: 8px; border: 1.5px dashed var(--border); background: var(--bg2); outline: none; font-family: inherit; cursor: pointer;">
    </div>
    <div style="display: flex; gap: 10px; justify-content: center;">
        <button onclick="saveProfile()" style="background: var(--accent); color: white; border-color: var(--accent);">Lưu thay đổi</button>
        <button onclick="closeProfileModal()">Đóng</button>
    </div>
  </div>
</div>

</body>
<script src="test.js"></script>
</html>
